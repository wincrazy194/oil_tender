<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 招标数据存档</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            color: white;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -5%;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        /* 筛选区域 */
        .filters {
            padding: 25px 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .filters label {
            font-size: 14px;
            color: #475569;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .search-box {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        /* 数据区域 */
        .section {
            padding: 30px 40px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .section-title {
            font-size: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }
        .section-title .count {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* 表格样式 */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            padding: 16px 15px;
            text-align: left;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            font-weight: 600;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 16px 15px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
        }
        tr:hover {
            background: linear-gradient(90deg, #eff6ff 0%, #ffffff 50%, #eff6ff 100%);
        }
        tr:last-child td {
            border-bottom: none;
        }
        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
            cursor: pointer;
        }
        .view-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59,130,246,0.4);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { padding: 25px; }
            .header h1 { font-size: 22px; }
            .filters { flex-direction: column; padding: 20px; }
            .search-box { width: 100%; }
            .section { padding: 20px; }
            .table-container { font-size: 13px; }
            th, td { padding: 12px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>📋</span> IT 招标数据存档</h1>
            <p>生成时间：<span id="generate-time"></span></p>
        </div>

        <div class="filters">
            <label>🔍</label>
            <input type="text" class="search-box" id="search" placeholder="搜索标题关键词...">
        </div>

        <div id="content"></div>
    </div>

    <script>
        // 数据将由 Python 脚本注入
        const records = [];

        // 设置生成时间
        document.getElementById('generate-time').textContent = new Date().toLocaleDateString('zh-CN');

        // 渲染页面
        function render(data) {
            const content = document.getElementById('content');

            if (data.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无数据</p>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <span>📄</span> 招标公告列表
                            <span class="count">${data.length}条</span>
                        </h2>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>标题</th>
                                    <th>类别</th>
                                    <th>公司</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(r => `
                                    <tr>
                                        <td style="white-space: nowrap;">${r.publish_date || '-'}</td>
                                        <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis;" title="${r.title.replace(/"/g, '&quot;')}">${r.title}</td>
                                        <td>${r.category || '-'}</td>
                                        <td>${r.company}</td>
                                        <td>
                                            <a href="${r.html_file}" class="view-btn" target="_blank">
                                                <span>👁</span>
                                                <span>${r.isLocalHtml ? '查看' : '官网'}</span>
                                            </a>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            content.innerHTML = html;
        }

        // 搜索功能
        document.getElementById('search').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('tbody tr');

            rows.forEach(tr => {
                const title = tr.querySelector('td:nth-child(2)').textContent.toLowerCase();
                const company = tr.querySelector('td:nth-child(4)').textContent.toLowerCase();
                const match = title.includes(keyword) || company.includes(keyword);
                tr.style.display = match ? '' : 'none';
            });

            // 更新可见数量
            const visibleCount = Array.from(rows).filter(tr => tr.style.display === '').length;
            const countEl = document.querySelector('.section-title .count');
            if (countEl) {
                countEl.textContent = `${visibleCount}条`;
            }
        });

        // 初始化渲染
        render(records);
    </script>
</body>
</html>
